name: 'supply_chain'
version: '1.0.0'
config-version: 2

# Profile name (must match an entry in profiles.yml)
profile: 'supply_chain'

# Paths
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# Model materialization defaults — overridden per folder below
models:
  supply_chain:
    # Staging models: views (cheap, always fresh)
    staging:
      +materialized: view
      +schema: staging
    # Marts models: tables (materialized for performance)
    marts:
      +materialized: table
      +schema: marts
