name: Deploy dbt Docs to GitHub Pages

# Deploy docs to GitHub Pages on every push to main (after CI passes).
on:
  push:
    branches: [main]
    paths:
      - 'models/**'
      - 'macros/**'
      - 'tests/**'
      - 'analyses/**'
      - 'dbt_project.yml'
      - 'profiles.yml'
      - '.github/workflows/dbt-docs.yml'
  workflow_dispatch:  # allows manual trigger from GitHub UI

# Required for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one docs deployment at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-docs:
    name: Generate dbt docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: dbt docs generate
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}
          SNOWFLAKE_ACCOUNT:   ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:      ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD:  ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ROLE:      ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE:  ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_SCHEMA:    DBT_CI
        run: dbt docs generate --target ci --no-partial-parse

      # dbt outputs a multi-file site; we need to copy them into a single dir
      # because GitHub Pages serves static assets relative to a root.
      - name: Prepare docs site
        run: |
          mkdir -p docs-site
          cp target/index.html docs-site/
          cp target/catalog.json docs-site/
          cp target/manifest.json docs-site/
          # Friendly landing page that redirects to dbt docs
          cat > docs-site/.nojekyll <<'EOF'
          EOF

      - name: Upload docs as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/

  deploy:
    name: Deploy to GitHub Pages
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
